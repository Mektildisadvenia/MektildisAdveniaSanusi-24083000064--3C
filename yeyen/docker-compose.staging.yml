version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: postgres_staging
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password123}
      POSTGRES_DB: ${POSTGRES_DB:-yeyen_staging}
    volumes:
      - pgdata_staging:/var/lib/postgresql/data
    networks:
      - staging_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend_staging
    environment:
      - PORT=8080
      - DATABASE_URL=postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password123}@db:5432/${POSTGRES_DB:-yeyen_staging}?sslmode=disable
    depends_on:
      - db
    networks:
      - staging_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend_staging
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - staging_net

volumes:
  pgdata_staging:

networks:
  staging_net:
    driver: bridge
